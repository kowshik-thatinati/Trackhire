# ─────────────────────────────────────────────────────────────────────────────
# Render Deployment Profile
#
# Activated when: SPRING_PROFILES_ACTIVE=render
# Database: PostgreSQL (Configure via Render Environment Variables)
#
# Run with: java -jar app.jar --spring.profiles.active=render
# ─────────────────────────────────────────────────────────────────────────────

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
