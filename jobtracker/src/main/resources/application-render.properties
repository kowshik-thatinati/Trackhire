# ─────────────────────────────────────────────────────────────────────────────
# Render Deployment Profile
#
# Activated when: SPRING_PROFILES_ACTIVE=render
# Database: PostgreSQL (Render managed, vars auto-injected by render.yaml)
#
# Run with: java -jar app.jar --spring.profiles.active=render
# ─────────────────────────────────────────────────────────────────────────────

# Render injects DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
# from the linked PostgreSQL service defined in render.yaml
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
