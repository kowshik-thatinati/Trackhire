# Server Configuration
server.port=${PORT:8080}

# --- DATABASE CONFIGURATION (Optimized for Render & Local MySQL) ---
# Using standard Spring Boot environment variables for maximum compatibility
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/jobtracker?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- OPTIONAL: H2 CONFIG (For local testing only) ---
# To use H2 locally without changing this file, run with:
# ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
# (You would need an application-local.properties file for this)