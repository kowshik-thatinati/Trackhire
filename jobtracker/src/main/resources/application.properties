# Server Configuration
server.port=${PORT:8080}

# --- DATABASE CONFIGURATION (Optimized for Railway & Production) ---
# Using environment variables provided by Railway
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- OPTIONAL: H2 CONFIG (For local testing only) ---
# To use H2 locally without changing this file, run with:
# ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
# (You would need an application-local.properties file for this)