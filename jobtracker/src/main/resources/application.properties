server.port=${PORT:8080}

# ── Database (MySQL — production) ────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# ── Actuator / Observability ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=JobTracker
info.app.version=1.0.0
info.app.description=Full-stack job application tracker

# ── Jackson ──────────────────────────────────────────────────────────────────
# Serialize LocalDateTime as ISO-8601 string, not an array
spring.jackson.serialization.write-dates-as-timestamps=false