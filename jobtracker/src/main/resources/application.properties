# Server Configuration
server.port=${PORT:8080}

# --- DATABASE CONFIGURATION (Optimized for Railway & Local MySQL) ---
# Using environment variables provided by Railway, with local defaults
spring.datasource.url=jdbc:mysql://${MYSQLHOST:127.0.0.1}:${MYSQLPORT:3306}/${MYSQLDATABASE:jobtracker}?createDatabaseIfNotExist=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- OPTIONAL: H2 CONFIG (For local testing only) ---
# To use H2 locally without changing this file, run with:
# ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
# (You would need an application-local.properties file for this)