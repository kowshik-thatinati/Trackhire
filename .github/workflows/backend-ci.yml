name: Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'jobtracker/**'
      - 'Dockerfile'
      - '.github/workflows/backend-ci.yml'

jobs:
  # ── Stage 1: Run Unit Tests ──────────────────────────────────────────────────
  test:
    name: 🧪 Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests (H2 dev profile)
        working-directory: jobtracker
        run: ./mvnw test --no-transfer-progress -Dspring-boot.run.profiles=dev

  # ── Stage 2: Build & Push Docker Image ──────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/jobtracker-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/jobtracker-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 3: Deploy to Render ────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
